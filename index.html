<div id="password-screen">
    <div class="login-box">    <h1>JUST US</h1>
    <p class="subtitle">Employee Resources Portal</p>

    <input
        type="text"
        placeholder="Username"
        id="usernameInput"
    >

    <input
        type="password"
        placeholder="Password"
        id="passwordInput"
    >

    <div class="captcha-row">
        <input type="checkbox" id="captchaCheck">
        <label for="captchaCheck">
            I'm not a robot
        </label>
    </div>

    <button onclick="checkPassword()">
        Sign In
    </button>

    <p id="error"></p>

    <div class="footer-text">
        Internal Use Only • Secure Access
    </div>

</div>

</div>

<div id="gallery" class="hidden">
    <h1>Our Memories 💜</h1>

    <div class="gallery-grid">
        <!-- Your memory cards are here -->
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
